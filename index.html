<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cassette</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg1:#2a1120;
  --bg2:#120916;
  --bg3:#3a1b34;

  --cassette-main:#3b1d30;
  --cassette-dark:#26111f;

  --rose-gold:#e0a9bf;
  --rose-metal:#ca88a4;
  --button1:#ecbfd0;
  --button2:#cc8ca7;
  --scene-bg:rgba(22,10,18,.42);
  --scene-bg-mobile:rgba(22,10,18,.28);
  --window-bg:#150b13;
  --tracklist-active:rgba(224,169,191,.22);
  --tracklist-hover:rgba(255,255,255,.08);

  --label:#fff6f0;
  --text:#f8eef4;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  min-height:100vh;
  min-height:100dvh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:Inter,sans-serif;
  color:var(--text);
  overflow-x:hidden;
  overflow-y:auto;
  background:linear-gradient(135deg,var(--bg1),var(--bg3) 52%,var(--bg2));
  position:relative;
  padding:28px 12px;
}

body::before,
body::after{
  content:"";
  position:absolute;
  inset:-20%;
  pointer-events:none;
}

body::before{
  background:
    radial-gradient(circle at 20% 25%,rgba(255,120,210,.2),transparent 35%),
    radial-gradient(circle at 80% 70%,rgba(120,190,255,.15),transparent 30%),
    radial-gradient(circle at 50% 50%,rgba(255,255,255,.08),transparent 45%);
  animation:aurora 14s linear infinite;
}

body::after{
  background:linear-gradient(120deg,transparent 20%,rgba(255,255,255,.05) 50%,transparent 80%);
  animation:scanline 8s linear infinite;
  mix-blend-mode:screen;
}

@keyframes aurora{
  0%{transform:translate3d(-2%,0,0) scale(1)}
  50%{transform:translate3d(3%,-3%,0) scale(1.08)}
  100%{transform:translate3d(-2%,0,0) scale(1)}
}

@keyframes scanline{
  0%{transform:translateX(-35%)}
  100%{transform:translateX(35%)}
}

.scene{
  width:min(520px,94vw);
  padding:24px;
  border-radius:28px;
  backdrop-filter:blur(8px);
  background:var(--scene-bg);
  border:1px solid rgba(255,255,255,.09);
  box-shadow:0 28px 80px rgba(0,0,0,.5);
  animation:floatScene 6s ease-in-out infinite;
  position:relative;
  z-index:1;
}

@media (max-width:640px){
  body{
    align-items:center;
    justify-content:center;
    padding:14px 10px;
  }

  body::before,
  body::after{
    display:none;
    animation:none;
  }

  .scene{
    width:min(440px,100%);
    margin-inline:auto;
    padding:10px;
    border-radius:20px;
    backdrop-filter:none;
    background:var(--scene-bg-mobile);
    animation:none;
  }

  .cassette{
    padding:18px 14px;
    border-radius:18px;
  }

  .window{
    height:128px;
    padding:14px;
    border-radius:12px;
  }

  .reel{
    width:70px;
    height:70px;
  }

  .meta{
    font-size:13px;
    line-height:1.4;
    margin-bottom:14px;
  }

  .controls{
    gap:8px;
  }

  button{
    padding:10px 14px;
    min-width:92px;
    font-size:10px;
  }

  .tracklist{
    max-height:180px;
    font-size:11px;
    padding:2px 6px;
  }

  .hint{
    font-size:10px;
    line-height:1.35;
    margin-top:8px;
  }
}

@keyframes floatScene{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-7px)}
}

.cassette{
  width:100%;
  background:linear-gradient(145deg,var(--cassette-main),var(--cassette-dark));
  border-radius:24px;
  padding:30px;
  box-shadow:
    inset 0 4px 8px rgba(255,255,255,0.07),
    inset 0 -14px 24px rgba(0,0,0,0.65),
    0 30px 70px rgba(0,0,0,0.6);
  position:relative;
}

.cassette::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:24px;
  background:linear-gradient(to bottom,rgba(255,255,255,0.08),transparent 45%);
  pointer-events:none;
}

.label{
  background:var(--label);
  color:#3a1f2e;
  padding:10px 16px;
  font-family:"IBM Plex Mono",monospace;
  font-size:11px;
  border-radius:8px;
  margin-bottom:22px;
  text-align:center;
  letter-spacing:1px;
  box-shadow:inset 0 1px 2px rgba(0,0,0,0.12);
}

.window{
  background:var(--window-bg);
  border-radius:16px;
  height:155px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:22px;
  position:relative;
  margin-bottom:18px;
  box-shadow:inset 0 6px 14px rgba(0,0,0,0.75);
  overflow:hidden;
}

.window::after{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at top,rgba(255,255,255,.1),transparent 55%);
  pointer-events:none;
}

.ribbon{
  position:absolute;
  height:3px;
  background:linear-gradient(90deg,transparent,var(--rose-metal),transparent);
  left:14%;
  right:14%;
  top:50%;
  transform:translateY(-50%);
  opacity:.85;
  animation:ribbonPulse 1.2s ease-in-out infinite;
}

@keyframes ribbonPulse{
  0%,100%{opacity:.55}
  50%{opacity:.9}
}

.reel{
  width:90px;
  height:90px;
  border-radius:50%;
  border:2px solid var(--rose-gold);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:inset 0 4px 10px rgba(0,0,0,0.5);
}

.ring{
  width:76%;
  height:76%;
  border-radius:50%;
  border:6px dashed var(--rose-gold);
  animation:idleSpin 5s linear infinite;
  opacity:.9;
}

#rightReel .ring{animation-direction:reverse}

.playing #leftReel .ring,
.playing #rightReel .ring{
  animation:reelSpin .65s linear infinite;
}

@keyframes idleSpin{
  from{transform:rotate(0)}
  to{transform:rotate(70deg)}
}

@keyframes reelSpin{
  from{transform:rotate(0)}
  to{transform:rotate(360deg)}
}

.meta{
  text-align:center;
  margin-bottom:16px;
  font-size:14px;
  letter-spacing:.6px;
  min-height:20px;
}

.controls{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-bottom:12px;
  flex-wrap:wrap;
}

button{
  background:linear-gradient(145deg,var(--button1),var(--button2));
  border:none;
  padding:9px 18px;
  font-family:"IBM Plex Mono",monospace;
  font-size:11px;
  cursor:pointer;
  border-radius:20px;
  color:#321928;
  box-shadow:0 4px 8px rgba(0,0,0,0.35),inset 0 1px 2px rgba(255,255,255,0.45);
  transition:transform .15s ease,filter .2s ease;
}

button:hover{filter:brightness(1.06)}
button:active{transform:scale(.95)}

.tracklist{
  max-height:150px;
  overflow:auto;
  font-size:12px;
  opacity:.92;
  text-align:left;
  padding:4px 10px;
  border-radius:10px;
  background:rgba(0,0,0,.14);
}

.tracklist div{
  padding:6px 8px;
  cursor:pointer;
  border-radius:8px;
  transition:background .2s ease,color .2s ease,transform .15s ease;
}

.tracklist div:hover{
  color:#ffeaf2;
  background:var(--tracklist-hover);
  transform:translateX(2px);
}

.tracklist .locked{opacity:.65}
.tracklist .active{background:var(--tracklist-active)}

.hint{
  margin-top:10px;
  text-align:center;
  font-size:11px;
  color:rgba(255,240,248,.86);
}
</style>
</head>

<body>

<div class="scene">
  <div class="cassette" id="cassette">
    <div class="label" id="cassetteLabel">SIDE A — FOR RIYA</div>

    <div class="window">
      <div class="reel" id="leftReel"><div class="ring"></div></div>
      <div class="ribbon"></div>
      <div class="reel" id="rightReel"><div class="ring"></div></div>
    </div>

    <div class="meta" id="trackMeta"></div>

    <div class="controls">
      <button onclick="prevTrack()">PREV</button>
      <button onclick="togglePlay()" id="playBtn">PLAY</button>
      <button onclick="nextTrack()">NEXT</button>
    </div>

    <div class="controls">
      <button onclick="switchSide('A')">SIDE A</button>
      <button onclick="switchSide('B')">SIDE B</button>
    </div>

    <div class="tracklist" id="trackList"></div>
    <div class="hint">Track names unlock after first play. Press play to reveal them.</div>
  </div>
</div>

<audio id="audio" preload="auto"></audio>
<audio id="hiss" src="sounds/hiss.mp3" preload="auto"></audio>

<script>
const playlists = {
  A: [
    {title:"Aa Jao Meri Tamanna",src:"songs/Aa Jao Meri Tamanna.mp3"},
    {title:"Dil Leke",src:"songs/Dil Leke.mp3"},
    {title:"Dooba Dooba",src:"songs/Dooba Dooba.mp3"},
    {title:"Hosanna",src:"songs/Hosanna.mp3"},
    {title:"Is This Love",src:"songs/Is This Love.mp3"}
  ],
  B: [
    {title:"Khudaya Khair",src:"songs/Khudaya Khair.mp3"},
    {title:"Mileya Mileya",src:"songs/Mileya Mileya.mp3"},
    {title:"Pani Da Rang Male",src:"songs/Pani Da Rang Male.mp3"},
    {title:"Tere Bina",src:"songs/Tere Bina.mp3"},
    {title:"Tere Naina",src:"songs/Tere Naina.mp3"}
  ]
};

let currentSide = "A";
let playlist = playlists[currentSide];
let index = 0;
let playing = false;
let reelAnimation;
const unlockedTracks = { A:new Set(), B:new Set() };

const audio = document.getElementById("audio");
const hiss = document.getElementById("hiss");
const meta = document.getElementById("trackMeta");
const playBtn = document.getElementById("playBtn");
const cassetteLabel = document.getElementById("cassetteLabel");
const cassette = document.getElementById("cassette");

const themes = [
  {
    name:"Cotton Candy",
    bg1:"#3d1530",bg2:"#170a1b",bg3:"#5c2b50",
    cassetteMain:"#4a2039",cassetteDark:"#27111f",
    roseGold:"#f6bdd7",roseMetal:"#d88eb4",
    button1:"#ffd2e4",button2:"#dd96ba",
    label:"#fff5fb",text:"#fff0f8",
    sceneBg:"rgba(33,12,27,.46)",sceneBgMobile:"rgba(33,12,27,.3)",
    windowBg:"#1b0c17",tracklistActive:"rgba(246,189,215,.24)",tracklistHover:"rgba(255,214,232,.12)"
  },
  {
    name:"Lilac Kiss",
    bg1:"#2f1439",bg2:"#12081b",bg3:"#4d2a65",
    cassetteMain:"#41224f",cassetteDark:"#22132b",
    roseGold:"#efc3ff",roseMetal:"#c78fe9",
    button1:"#f5d5ff",button2:"#c98ae6",
    label:"#fff7ff",text:"#f9efff",
    sceneBg:"rgba(26,11,36,.46)",sceneBgMobile:"rgba(26,11,36,.3)",
    windowBg:"#170d22",tracklistActive:"rgba(239,195,255,.24)",tracklistHover:"rgba(242,220,255,.12)"
  },
  {
    name:"Berry Pop",
    bg1:"#48142f",bg2:"#1a0913",bg3:"#742f67",
    cassetteMain:"#5b2347",cassetteDark:"#2d1023",
    roseGold:"#ffb6d0",roseMetal:"#f080b3",
    button1:"#ffd0e1",button2:"#ec7db0",
    label:"#fff6fb",text:"#ffeff7",
    sceneBg:"rgba(37,10,24,.46)",sceneBgMobile:"rgba(37,10,24,.3)",
    windowBg:"#220c16",tracklistActive:"rgba(255,182,208,.22)",tracklistHover:"rgba(255,212,229,.12)"
  },
  {
    name:"Dreamy Mauve",
    bg1:"#35203f",bg2:"#150d1b",bg3:"#61426f",
    cassetteMain:"#493255",cassetteDark:"#25172d",
    roseGold:"#e8c5f5",roseMetal:"#c69bde",
    button1:"#f3dcff",button2:"#c89adf",
    label:"#fff8ff",text:"#f8f0ff",
    sceneBg:"rgba(30,17,38,.46)",sceneBgMobile:"rgba(30,17,38,.3)",
    windowBg:"#1a1222",tracklistActive:"rgba(232,197,245,.23)",tracklistHover:"rgba(243,220,255,.12)"
  },
  {
    name:"Rose Quartz",
    bg1:"#4b1d34",bg2:"#190a13",bg3:"#8f4f75",
    cassetteMain:"#622744",cassetteDark:"#2f1222",
    roseGold:"#ffc4db",roseMetal:"#f195ba",
    button1:"#ffdcea",button2:"#ef99be",
    label:"#fff7fb",text:"#fff1f7",
    sceneBg:"rgba(38,13,24,.46)",sceneBgMobile:"rgba(38,13,24,.3)",
    windowBg:"#210c16",tracklistActive:"rgba(255,196,219,.24)",tracklistHover:"rgba(255,220,234,.12)"
  },
  {
    name:"Violet Bloom",
    bg1:"#2c1241",bg2:"#100818",bg3:"#5f3187",
    cassetteMain:"#3d1d59",cassetteDark:"#1f102d",
    roseGold:"#dcbfff",roseMetal:"#b58ae6",
    button1:"#edd8ff",button2:"#b784ea",
    label:"#fcf8ff",text:"#f5efff",
    sceneBg:"rgba(24,10,37,.46)",sceneBgMobile:"rgba(24,10,37,.3)",
    windowBg:"#150d21",tracklistActive:"rgba(220,191,255,.24)",tracklistHover:"rgba(237,216,255,.12)"
  },
  {
    name:"Cupid Glow",
    bg1:"#531a3d",bg2:"#1d0a15",bg3:"#9a4f83",
    cassetteMain:"#6b2950",cassetteDark:"#341226",
    roseGold:"#ffcade",roseMetal:"#f09abb",
    button1:"#ffe0eb",button2:"#ee9ec0",
    label:"#fff8fc",text:"#fff2f8",
    sceneBg:"rgba(41,12,27,.46)",sceneBgMobile:"rgba(41,12,27,.3)",
    windowBg:"#250d18",tracklistActive:"rgba(255,202,222,.23)",tracklistHover:"rgba(255,224,235,.12)"
  }
];

function applyRandomTheme(){
  const theme = themes[Math.floor(Math.random() * themes.length)];
  const root = document.documentElement;
  root.style.setProperty("--bg1", theme.bg1);
  root.style.setProperty("--bg2", theme.bg2);
  root.style.setProperty("--bg3", theme.bg3);
  root.style.setProperty("--cassette-main", theme.cassetteMain);
  root.style.setProperty("--cassette-dark", theme.cassetteDark);
  root.style.setProperty("--rose-gold", theme.roseGold);
  root.style.setProperty("--rose-metal", theme.roseMetal);
  root.style.setProperty("--button1", theme.button1);
  root.style.setProperty("--button2", theme.button2);
  root.style.setProperty("--label", theme.label);
  root.style.setProperty("--text", theme.text);
  root.style.setProperty("--scene-bg", theme.sceneBg);
  root.style.setProperty("--scene-bg-mobile", theme.sceneBgMobile);
  root.style.setProperty("--window-bg", theme.windowBg);
  root.style.setProperty("--tracklist-active", theme.tracklistActive);
  root.style.setProperty("--tracklist-hover", theme.tracklistHover);
}

function maskedTrackName(i){
  if(unlockedTracks[currentSide].has(i)) return playlist[i].title;
  return "????????????????";
}

function loadTrack(i){
  audio.src = encodeURI(playlist[i].src);
  audio.load();
  meta.textContent = "Track " + String(i+1).padStart(2,"0") + " — " + maskedTrackName(i);
  highlightCurrentTrack();
}

function highlightCurrentTrack(){
  const rows = document.querySelectorAll("#trackList div");
  rows.forEach((row, i)=>{
    row.classList.toggle("active", i === index);
  });
}

function renderTrackRow(track, i){
  const div = document.createElement("div");
  const unlocked = unlockedTracks[currentSide].has(i);
  div.textContent = `${String(i+1).padStart(2,"0")}. ${unlocked ? track.title : "[LOCKED TRACK]"}`;
  div.className = unlocked ? "" : "locked";
  div.onclick = ()=>{
    index = i;
    loadTrack(index);
    if(playing){
      playWithHiss();
    }
  };
  return div;
}

function buildTrackList(){
  const container = document.getElementById("trackList");
  container.innerHTML = "";
  playlist.forEach((track,i)=>{
    container.appendChild(renderTrackRow(track,i));
  });
  highlightCurrentTrack();
}

function refreshMetaAndTrackList(){
  buildTrackList();
  meta.textContent = "Track " + String(index+1).padStart(2,"0") + " — " + maskedTrackName(index);
}

function switchSide(side){
  if(side === currentSide) return;
  currentSide = side;
  playlist = playlists[currentSide];
  index = 0;
  audio.pause();
  playing = false;
  playBtn.textContent = "PLAY";
  cassette.classList.remove("playing");
  cancelAnimationFrame(reelAnimation);
  cassetteLabel.textContent = `SIDE ${currentSide} — FOR RIYA`;
  loadTrack(index);
  buildTrackList();
}

function playWithHiss(){
  hiss.currentTime = 0;
  hiss.volume = 0.28;
  hiss.play().catch(()=>{});
  audio.play();
}

function unlockCurrentTrack(){
  unlockedTracks[currentSide].add(index);
  refreshMetaAndTrackList();
}

function togglePlay(){
  if(!playing){
    playing = true;
    playBtn.textContent = "PAUSE";
    cassette.classList.add("playing");
    unlockCurrentTrack();
    playWithHiss();
    animateReels();
  }else{
    playing = false;
    playBtn.textContent = "PLAY";
    audio.pause();
    cassette.classList.remove("playing");
    cancelAnimationFrame(reelAnimation);
  }
}

function nextTrack(){
  if(index < playlist.length - 1){
    index++;
    loadTrack(index);
    if(playing){
      unlockCurrentTrack();
      playWithHiss();
    }
  }
}

function prevTrack(){
  if(index > 0){
    index--;
    loadTrack(index);
    if(playing){
      unlockCurrentTrack();
      playWithHiss();
    }
  }
}

audio.addEventListener("ended", ()=>{
  if(index < playlist.length - 1){
    nextTrack();
  }else{
    playing = false;
    playBtn.textContent = "PLAY";
    cassette.classList.remove("playing");
    cancelAnimationFrame(reelAnimation);
  }
});

function animateReels(){
  if(!playing) return;
  if(audio.duration){
    const progress = audio.currentTime / audio.duration;
    const leftScale = 1 - progress * 0.28;
    const rightScale = 0.72 + progress * 0.28;
    document.getElementById("leftReel").style.transform = `scale(${leftScale})`;
    document.getElementById("rightReel").style.transform = `scale(${rightScale})`;
  }
  reelAnimation = requestAnimationFrame(animateReels);
}

applyRandomTheme();
loadTrack(index);
buildTrackList();
</script>

</body>
</html>
