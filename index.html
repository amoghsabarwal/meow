<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cassette</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg1:#2b1a23;
  --bg2:#140c12;

  --cassette-main:#3a1f2e;
  --cassette-dark:#2b1623;

  --rose-gold:#d6a4b4;
  --rose-metal:#c88aa0;

  --label:#f7efe9;
  --text:#f4e8ee;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  background:radial-gradient(circle at top,var(--bg1),var(--bg2) 75%);
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:Inter,sans-serif;
  color:var(--text);
}

/* Cassette Body */

.cassette{
  width:min(460px,92vw);
  background:
    linear-gradient(145deg,var(--cassette-main),var(--cassette-dark));
  border-radius:20px;
  padding:28px;
  box-shadow:
    inset 0 4px 8px rgba(255,255,255,0.05),
    inset 0 -10px 20px rgba(0,0,0,0.6),
    0 40px 70px rgba(0,0,0,0.8);
  position:relative;
}

/* Subtle gloss layer */
.cassette::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:20px;
  background:linear-gradient(
    to bottom,
    rgba(255,255,255,0.06),
    transparent 40%
  );
  pointer-events:none;
}

/* Label */

.label{
  background:var(--label);
  color:#3a1f2e;
  padding:10px 16px;
  font-family:"IBM Plex Mono",monospace;
  font-size:11px;
  border-radius:6px;
  margin-bottom:20px;
  text-align:center;
  letter-spacing:1px;
  box-shadow:
    inset 0 1px 2px rgba(0,0,0,0.1);
}

/* Window */

.window{
  background:#160e14;
  border-radius:14px;
  height:140px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:22px;
  position:relative;
  margin-bottom:22px;
  box-shadow:
    inset 0 6px 14px rgba(0,0,0,0.7);
}

/* Tape ribbon */

.ribbon{
  position:absolute;
  height:3px;
  background:var(--rose-metal);
  left:15%;
  right:15%;
  top:50%;
  transform:translateY(-50%);
  opacity:.7;
}

/* Reels */

.reel{
  width:85px;height:85px;
  border-radius:50%;
  border:2px solid var(--rose-gold);
  display:flex;
  align-items:center;
  justify-content:center;
  transition:transform .2s linear;
  box-shadow:
    inset 0 4px 8px rgba(0,0,0,0.5);
}

.teeth{
  width:70%;height:70%;
  border-radius:50%;
  border:6px dashed var(--rose-gold);
}

.rotating{
  animation:spin linear infinite;
}

@keyframes spin{
  from{transform:rotate(0)}
  to{transform:rotate(360deg)}
}

/* Meta */

.meta{
  text-align:center;
  margin-bottom:16px;
  font-size:14px;
  letter-spacing:.5px;
  opacity:.9;
}

/* Controls */

.controls{
  display:flex;
  justify-content:center;
  gap:14px;
  margin-bottom:12px;
}

button{
  background:linear-gradient(145deg,#e2b6c4,#c88aa0);
  border:none;
  padding:8px 16px;
  font-family:"IBM Plex Mono",monospace;
  font-size:11px;
  cursor:pointer;
  border-radius:20px;
  color:#3a1f2e;
  box-shadow:
    0 4px 8px rgba(0,0,0,0.4),
    inset 0 1px 2px rgba(255,255,255,0.4);
  transition:transform .15s ease;
}

button:active{
  transform:scale(.96);
}

/* Tracklist */

.tracklist{
  max-height:120px;
  overflow:auto;
  font-size:12px;
  opacity:.75;
  text-align:center;
}

.tracklist div{
  padding:4px;
  cursor:pointer;
  transition:color .2s ease;
}

.tracklist div:hover{
  color:var(--rose-gold);
}
</style>
</head>

<body>

<div class="cassette">

  <div class="label" id="cassetteLabel">SIDE A — FOR RIYA</div>

  <div class="window">
    <div class="reel" id="leftReel"><div class="teeth"></div></div>
    <div class="ribbon"></div>
    <div class="reel" id="rightReel"><div class="teeth"></div></div>
  </div>

  <div class="meta" id="trackMeta"></div>

  <div class="controls">
    <button onclick="prevTrack()">PREV</button>
    <button onclick="togglePlay()" id="playBtn">PLAY</button>
    <button onclick="nextTrack()">NEXT</button>
  </div>

  <div class="controls">
    <button onclick="switchSide('A')">SIDE A</button>
    <button onclick="switchSide('B')">SIDE B</button>
  </div>

  <div class="tracklist" id="trackList"></div>

</div>

<audio id="audio" preload="auto"></audio>
<audio id="hiss" src="sounds/hiss.mp3"></audio>

<script>
const playlists = {
  A: [
    {title:"we're fucked, it's fine",src:"songs/we're fucked, it's fine.mp3"},
    {title:"Stay Down",src:"songs/Stay Down.mp3"},
    {title:"Annie's Song",src:"songs/Annie's Song.mp3"},
    {title:"By Your Side",src:"songs/By Your Side.mp3"},
    {title:"Afterthought",src:"songs/Afterthought.mp3"}
  ],
  B: [
    {title:"Kaleji",src:"songs/Kaleji.mp3"},
    {title:"Gravity",src:"songs/Gravity.mp3"},
    {title:"Slide",src:"songs/Slide.mp3"},
    {title:"Backseat",src:"songs/Backseat.mp3"},
    {title:"Maybe So",src:"songs/Maybe So.mp3"}
  ]
};

let currentSide = "A";
let playlist = playlists[currentSide];

let index = 0;
let playing = false;
let reelAnimation;

const audio = document.getElementById("audio");
const meta = document.getElementById("trackMeta");
const playBtn = document.getElementById("playBtn");
const cassetteLabel = document.getElementById("cassetteLabel");
const leftReel = document.getElementById("leftReel");
const rightReel = document.getElementById("rightReel");

function loadTrack(i){
  audio.src = encodeURI(playlist[i].src);
  audio.load();
  meta.textContent = "Track " + String(i+1).padStart(2,"0") + " — " + playlist[i].title;
}

function buildTrackList(){
  const container = document.getElementById("trackList");
  container.innerHTML = "";
  playlist.forEach((track,i)=>{
    const div = document.createElement("div");
    div.textContent = (i+1)+". "+track.title;
    div.onclick = ()=>{
      index=i;
      loadTrack(index);
      if(playing) audio.play();
    };
    container.appendChild(div);
  });
}

function switchSide(side){
  if(side === currentSide) return;

  currentSide = side;
  playlist = playlists[currentSide];
  index = 0;

  audio.pause();
  playing = false;
  playBtn.textContent = "PLAY";
  leftReel.classList.remove("rotating");
  rightReel.classList.remove("rotating");
  cancelAnimationFrame(reelAnimation);

  cassetteLabel.textContent = `SIDE ${currentSide} — FOR RIYA`;
  loadTrack(index);
  buildTrackList();
}

function togglePlay(){
  if(!playing){
    playing=true;
    playBtn.textContent="PAUSE";
    audio.play();
    leftReel.classList.add("rotating");
    rightReel.classList.add("rotating");
    animateReels();
  }else{
    playing=false;
    playBtn.textContent="PLAY";
    audio.pause();
    leftReel.classList.remove("rotating");
    rightReel.classList.remove("rotating");
    cancelAnimationFrame(reelAnimation);
  }
}

function nextTrack(){
  if(index<playlist.length-1){
    index++;
    loadTrack(index);
    if(playing) audio.play();
  }
}

function prevTrack(){
  if(index>0){
    index--;
    loadTrack(index);
    if(playing) audio.play();
  }
}

audio.addEventListener("ended",nextTrack);

function animateReels(){
  if(!playing) return;

  if(audio.duration){
    const progress = audio.currentTime / audio.duration;
    leftReel.style.transform = `scale(${1-progress*0.3})`;
    rightReel.style.transform = `scale(${0.7+progress*0.3})`;
  }

  reelAnimation = requestAnimationFrame(animateReels);
}

loadTrack(index);
buildTrackList();
</script>

</body>
</html>
