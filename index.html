<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cassette</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{
  --bg1:#2a1120;
  --bg2:#120916;
  --bg3:#3a1b34;

  --cassette-main:#3b1d30;
  --cassette-dark:#26111f;

  --rose-gold:#e0a9bf;
  --rose-metal:#ca88a4;

  --label:#fff6f0;
  --text:#f8eef4;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:Inter,sans-serif;
  color:var(--text);
  overflow:hidden;
  background:linear-gradient(120deg,var(--bg1),var(--bg2));
  position:relative;
}

body::before,
body::after{
  content:"";
  position:absolute;
  inset:-20%;
  pointer-events:none;
}

body::before{
  background:
    radial-gradient(circle at 20% 25%,rgba(255,120,210,.2),transparent 35%),
    radial-gradient(circle at 80% 70%,rgba(120,190,255,.15),transparent 30%),
    radial-gradient(circle at 50% 50%,rgba(255,255,255,.08),transparent 45%);
  animation:aurora 14s linear infinite;
}

body::after{
  background:linear-gradient(120deg,transparent 20%,rgba(255,255,255,.05) 50%,transparent 80%);
  animation:scanline 8s linear infinite;
  mix-blend-mode:screen;
}

@keyframes aurora{
  0%{transform:translate3d(-2%,0,0) scale(1)}
  50%{transform:translate3d(3%,-3%,0) scale(1.08)}
  100%{transform:translate3d(-2%,0,0) scale(1)}
}

@keyframes scanline{
  0%{transform:translateX(-35%)}
  100%{transform:translateX(35%)}
}

.scene{
  width:min(520px,94vw);
  padding:24px;
  border-radius:28px;
  backdrop-filter:blur(8px);
  background:rgba(22,10,18,.42);
  border:1px solid rgba(255,255,255,.09);
  box-shadow:0 28px 80px rgba(0,0,0,.5);
  animation:floatScene 6s ease-in-out infinite;
  position:relative;
  z-index:1;
}

@keyframes floatScene{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-7px)}
}

.cassette{
  width:100%;
  background:linear-gradient(145deg,var(--cassette-main),var(--cassette-dark));
  border-radius:24px;
  padding:30px;
  box-shadow:
    inset 0 4px 8px rgba(255,255,255,0.07),
    inset 0 -14px 24px rgba(0,0,0,0.65),
    0 30px 70px rgba(0,0,0,0.6);
  position:relative;
}

.cassette::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:24px;
  background:linear-gradient(to bottom,rgba(255,255,255,0.08),transparent 45%);
  pointer-events:none;
}

.label{
  background:var(--label);
  color:#3a1f2e;
  padding:10px 16px;
  font-family:"IBM Plex Mono",monospace;
  font-size:11px;
  border-radius:8px;
  margin-bottom:22px;
  text-align:center;
  letter-spacing:1px;
  box-shadow:inset 0 1px 2px rgba(0,0,0,0.12);
}

.window{
  background:#150b13;
  border-radius:16px;
  height:155px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:22px;
  position:relative;
  margin-bottom:18px;
  box-shadow:inset 0 6px 14px rgba(0,0,0,0.75);
  overflow:hidden;
}

.window::after{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at top,rgba(255,255,255,.1),transparent 55%);
  pointer-events:none;
}

.ribbon{
  position:absolute;
  height:3px;
  background:linear-gradient(90deg,transparent,var(--rose-metal),transparent);
  left:14%;
  right:14%;
  top:50%;
  transform:translateY(-50%);
  opacity:.85;
  animation:ribbonPulse 1.2s ease-in-out infinite;
}

@keyframes ribbonPulse{
  0%,100%{opacity:.55}
  50%{opacity:.9}
}

.reel{
  width:90px;
  height:90px;
  border-radius:50%;
  border:2px solid var(--rose-gold);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:inset 0 4px 10px rgba(0,0,0,0.5);
}

.ring{
  width:76%;
  height:76%;
  border-radius:50%;
  border:6px dashed var(--rose-gold);
  animation:idleSpin 5s linear infinite;
  opacity:.9;
}

#rightReel .ring{animation-direction:reverse}

.playing #leftReel .ring,
.playing #rightReel .ring{
  animation:reelSpin .65s linear infinite;
}

@keyframes idleSpin{
  from{transform:rotate(0)}
  to{transform:rotate(70deg)}
}

@keyframes reelSpin{
  from{transform:rotate(0)}
  to{transform:rotate(360deg)}
}

.meta{
  text-align:center;
  margin-bottom:16px;
  font-size:14px;
  letter-spacing:.6px;
  min-height:20px;
}

.controls{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-bottom:12px;
  flex-wrap:wrap;
}

button{
  background:linear-gradient(145deg,#ecbfd0,#cc8ca7);
  border:none;
  padding:9px 18px;
  font-family:"IBM Plex Mono",monospace;
  font-size:11px;
  cursor:pointer;
  border-radius:20px;
  color:#321928;
  box-shadow:0 4px 8px rgba(0,0,0,0.35),inset 0 1px 2px rgba(255,255,255,0.45);
  transition:transform .15s ease,filter .2s ease;
}

button:hover{filter:brightness(1.06)}
button:active{transform:scale(.95)}

.tracklist{
  max-height:150px;
  overflow:auto;
  font-size:12px;
  opacity:.92;
  text-align:left;
  padding:4px 10px;
  border-radius:10px;
  background:rgba(0,0,0,.14);
}

.tracklist div{
  padding:6px 8px;
  cursor:pointer;
  border-radius:8px;
  transition:background .2s ease,color .2s ease,transform .15s ease;
}

.tracklist div:hover{
  color:#ffeaf2;
  background:rgba(255,255,255,.08);
  transform:translateX(2px);
}

.tracklist .locked{opacity:.65}
.tracklist .active{background:rgba(224,169,191,.22)}

.hint{
  margin-top:10px;
  text-align:center;
  font-size:11px;
  color:rgba(255,240,248,.86);
}
</style>
</head>

<body>

<div class="scene">
  <div class="cassette" id="cassette">
    <div class="label" id="cassetteLabel">SIDE A — FOR RIYA</div>

    <div class="window">
      <div class="reel" id="leftReel"><div class="ring"></div></div>
      <div class="ribbon"></div>
      <div class="reel" id="rightReel"><div class="ring"></div></div>
    </div>

    <div class="meta" id="trackMeta"></div>

    <div class="controls">
      <button onclick="prevTrack()">PREV</button>
      <button onclick="togglePlay()" id="playBtn">PLAY</button>
      <button onclick="nextTrack()">NEXT</button>
    </div>

    <div class="controls">
      <button onclick="switchSide('A')">SIDE A</button>
      <button onclick="switchSide('B')">SIDE B</button>
    </div>

    <div class="tracklist" id="trackList"></div>
    <div class="hint">Track names unlock after first play. Press play to reveal them.</div>
  </div>
</div>

<audio id="audio" preload="auto"></audio>
<audio id="hiss" src="sounds/hiss.mp3" preload="auto"></audio>

<script>
const playlists = {
  A: [
    {title:"Aa Jao Meri Tamanna",src:"songs/Aa Jao Meri Tamanna.mp3"},
    {title:"Dil Leke",src:"songs/Dil Leke.mp3"},
    {title:"Dooba Dooba",src:"songs/Dooba Dooba.mp3"},
    {title:"Hosanna",src:"songs/Hosanna.mp3"},
    {title:"Is This Love",src:"songs/Is This Love.mp3"}
  ],
  B: [
    {title:"Khudaya Khair",src:"songs/Khudaya Khair.mp3"},
    {title:"Mileya Mileya",src:"songs/Mileya Mileya.mp3"},
    {title:"Pani Da Rang Male",src:"songs/Pani Da Rang Male.mp3"},
    {title:"Tere Bina",src:"songs/Tere Bina.mp3"},
    {title:"Tere Naina",src:"songs/Tere Naina.mp3"}
  ]
};

let currentSide = "A";
let playlist = playlists[currentSide];
let index = 0;
let playing = false;
let reelAnimation;
const unlockedTracks = { A:new Set(), B:new Set() };

const audio = document.getElementById("audio");
const hiss = document.getElementById("hiss");
const meta = document.getElementById("trackMeta");
const playBtn = document.getElementById("playBtn");
const cassetteLabel = document.getElementById("cassetteLabel");
const cassette = document.getElementById("cassette");

function maskedTrackName(i){
  if(unlockedTracks[currentSide].has(i)) return playlist[i].title;
  return "????????????????";
}

function loadTrack(i){
  audio.src = encodeURI(playlist[i].src);
  audio.load();
  meta.textContent = "Track " + String(i+1).padStart(2,"0") + " — " + maskedTrackName(i);
  highlightCurrentTrack();
}

function highlightCurrentTrack(){
  const rows = document.querySelectorAll("#trackList div");
  rows.forEach((row, i)=>{
    row.classList.toggle("active", i === index);
  });
}

function renderTrackRow(track, i){
  const div = document.createElement("div");
  const unlocked = unlockedTracks[currentSide].has(i);
  div.textContent = `${String(i+1).padStart(2,"0")}. ${unlocked ? track.title : "[LOCKED TRACK]"}`;
  div.className = unlocked ? "" : "locked";
  div.onclick = ()=>{
    index = i;
    loadTrack(index);
    if(playing){
      playWithHiss();
    }
  };
  return div;
}

function buildTrackList(){
  const container = document.getElementById("trackList");
  container.innerHTML = "";
  playlist.forEach((track,i)=>{
    container.appendChild(renderTrackRow(track,i));
  });
  highlightCurrentTrack();
}

function refreshMetaAndTrackList(){
  buildTrackList();
  meta.textContent = "Track " + String(index+1).padStart(2,"0") + " — " + maskedTrackName(index);
}

function switchSide(side){
  if(side === currentSide) return;
  currentSide = side;
  playlist = playlists[currentSide];
  index = 0;
  audio.pause();
  playing = false;
  playBtn.textContent = "PLAY";
  cassette.classList.remove("playing");
  cancelAnimationFrame(reelAnimation);
  cassetteLabel.textContent = `SIDE ${currentSide} — FOR RIYA`;
  loadTrack(index);
  buildTrackList();
}

function playWithHiss(){
  hiss.currentTime = 0;
  hiss.volume = 0.28;
  hiss.play().catch(()=>{});
  audio.play();
}

function unlockCurrentTrack(){
  unlockedTracks[currentSide].add(index);
  refreshMetaAndTrackList();
}

function togglePlay(){
  if(!playing){
    playing = true;
    playBtn.textContent = "PAUSE";
    cassette.classList.add("playing");
    unlockCurrentTrack();
    playWithHiss();
    animateReels();
  }else{
    playing = false;
    playBtn.textContent = "PLAY";
    audio.pause();
    cassette.classList.remove("playing");
    cancelAnimationFrame(reelAnimation);
  }
}

function nextTrack(){
  if(index < playlist.length - 1){
    index++;
    loadTrack(index);
    if(playing){
      unlockCurrentTrack();
      playWithHiss();
    }
  }
}

function prevTrack(){
  if(index > 0){
    index--;
    loadTrack(index);
    if(playing){
      unlockCurrentTrack();
      playWithHiss();
    }
  }
}

audio.addEventListener("ended", ()=>{
  if(index < playlist.length - 1){
    nextTrack();
  }else{
    playing = false;
    playBtn.textContent = "PLAY";
    cassette.classList.remove("playing");
    cancelAnimationFrame(reelAnimation);
  }
});

function animateReels(){
  if(!playing) return;
  if(audio.duration){
    const progress = audio.currentTime / audio.duration;
    const leftScale = 1 - progress * 0.28;
    const rightScale = 0.72 + progress * 0.28;
    document.getElementById("leftReel").style.transform = `scale(${leftScale})`;
    document.getElementById("rightReel").style.transform = `scale(${rightScale})`;
  }
  reelAnimation = requestAnimationFrame(animateReels);
}

loadTrack(index);
buildTrackList();
</script>

</body>
</html>
